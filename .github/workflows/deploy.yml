name: CI/CD Pipeline - Tienda de Perritos

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1                         # Región por defecto de AWS Academy
  ECS_CLUSTER: tiendaperritos-cluster           # Nombre de tu clúster de ECS
  FRONTEND_SERVICE: frontend-service            # Nombre del servicio ECS para el Frontend
  BACKEND_SERVICE: backend-service              # Nombre del servicio ECS para el Backend
  ECR_FRONTEND_REPO: tiendaperritos-frontend    # Nombre del repositorio ECR para el Frontend
  ECR_BACKEND_REPO: tiendaperritos-backend      # Nombre del repositorio ECR para el Backend

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy to AWS ECS
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Configurar credenciales de AWS
    # SOPORTA CREDENCIALES TEMPORALES (Requerido para AWS Academy / Learner Lab)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Obligatorio para AWS Academy
        aws-region: ${{ env.AWS_REGION }}

    # 2. Login en Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 3. Build, Tag y Push de Imagen del Backend
    - name: Build and Push Backend Image
      id: build-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest ./backend
        docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest
        echo "backend_image=$ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 4. Build, Tag y Push de Imagen del Frontend
    - name: Build and Push Frontend Image
      id: build-frontend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest ./frontend
        docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_FRONTEND_REPO:latest
        echo "frontend_image=$ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 5. Desplegar actualización en AWS ECS (Método CLI recomendado para laboratorios académicos)
    # Este método obtiene la tarea actual, genera una nueva versión y actualiza el servicio sin requerir archivos JSON estáticos.
    - name: Deploy to Amazon ECS Services
      run: |
        echo "Actualizando servicios en ECS..."
        
        # Forzar el redespliegue de los servicios para que descarguen las imágenes con tag 'latest'
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.BACKEND_SERVICE }} --force-new-deployment
        aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.FRONTEND_SERVICE }} --force-new-deployment
        
        echo "¡Despliegue gatillado con éxito en ECS!"
